<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE v8.2</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* TOP TITLE */
#header{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:12px;
  letter-spacing:4px;
  opacity:0.7;
  z-index:30;
}

/* NAV ARROWS */
#nav{
  position:fixed;
  top:45px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:15px;
  z-index:30;
}

.arrow{
  color:white;
  font-size:28px;
  cursor:pointer;
  user-select:none;
  opacity:0.6;
  transition:0.2s;
}

.arrow:hover{
  opacity:1;
  transform:scale(1.2);
}

/* CATEGORY LABEL */
#centerLabel{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  letter-spacing:5px;
  opacity:0.8;
  z-index:30;
}

/* THUMBNAILS */
#thumbs{
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:30;
}

.thumb{
  width:70px;
  height:45px;
  border-radius:6px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.25);
  opacity:0.6;
  cursor:pointer;
  transition:0.3s;
}

.thumb:hover{
  transform:scale(1.1);
  opacity:1;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* WORLD */
#world{
  display:flex;
  width:400vw;
  height:100vh;
  transition:transform 1s cubic-bezier(.77,0,.18,1);
}

.panel{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* ================= ROMA ================= */
.roma{
  width:100%;
  height:100%;
  background:radial-gradient(circle,#3a3a3a,#000);
}

/* ================= COLD ================= */
.cold{
  width:100%;
  height:100%;
  background:linear-gradient(#061522,#000);
}

.ice{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent);
}

/* ================= HOT ================= */
.hot{
  width:100%;
  height:100%;
  background:linear-gradient(#d8b45a,#6b4b1a);
}

.sand{
  position:absolute;
  width:200%;
  height:200%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 6px
  );
  animation:storm 4s linear infinite;
}

@keyframes storm{
  0%{transform:translate(-10%,-10%)}
  100%{transform:translate(10%,10%)}
}

.pyramid{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:160px;
  height:160px;
  background:linear-gradient(135deg,#c9a24a,#6b4b1a);
  clip-path:polygon(50% 0,0 100%,100% 100%);
}

/* ================= NEON ================= */
#neonCanvas{
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div id="header">ARCHIVE SELECT</div>

<div id="nav">
  <div class="arrow" onclick="go(index-1)">‹</div>
  <div class="arrow" onclick="go(index+1)">›</div>
</div>

<!-- THUMBNAILS -->
<div id="thumbs">

  <div class="thumb" onclick="go(0)">
    <img src="https://images.unsplash.com/photo-1548013146-72479768bada">
  </div>

  <div class="thumb" onclick="go(1)">
    <img src="https://images.unsplash.com/photo-1608889175123-1c6f9f6c9b6c">
  </div>

  <div class="thumb" onclick="go(2)">
    <img src="https://images.unsplash.com/photo-1547887537-6158d64c35b3">
  </div>

  <div class="thumb" onclick="go(3)">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  </div>

</div>

<div id="centerLabel"></div>

<div id="world">

  <div class="panel"><div class="roma"></div></div>

  <div class="panel"><div class="cold"><div class="ice"></div></div></div>

  <div class="panel"><div class="hot"><div class="sand"></div><div class="pyramid"></div></div></div>

  <div class="panel"><canvas id="neonCanvas"></canvas></div>

</div>

<script src="archive.js"></script>

</body>
</html>
