<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE v8</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* ================= TOP CATEGORY TEXT ================= */
#titleBar{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:12px;
  letter-spacing:4px;
  opacity:0.7;
  z-index:30;
}

/* ================= THUMBNAIL SELECT ================= */
#top{
  position:fixed;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:20;
}

.navBtn{
  width:70px;
  height:45px;
  border:1px solid rgba(255,255,255,0.25);
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  opacity:0.6;
  transition:0.3s;
}

.navBtn:hover{
  transform:scale(1.15);
  opacity:1;
}

.navBtn img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= CENTER LABEL ================= */
#centerLabel{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  letter-spacing:5px;
  opacity:0.8;
  z-index:30;
}

/* ================= WORLD ================= */
#world{
  display:flex;
  width:400vw;
  height:100vh;
  transition:transform 1s cubic-bezier(.77,0,.18,1);
}

.panel{
  width:100vw;
  height:100vh;
  position:relative;
}

/* ================= ROMA ================= */
.roma{
  width:100%;
  height:100%;
  background:radial-gradient(circle,#3a3a3a,#000);
}

/* columns */
.roma::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.06),
    rgba(255,255,255,0.06) 40px,
    transparent 40px,
    transparent 120px
  );
}

/* ================= COLD ================= */
.cold{
  width:100%;
  height:100%;
  background:linear-gradient(#061522,#000);
}

.ice{
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.1), transparent);
}

/* ================= HOT ================= */
.hot{
  width:100%;
  height:100%;
  background:linear-gradient(#d8b45a,#6b4b1a);
  position:relative;
  overflow:hidden;
}

.sand{
  position:absolute;
  width:200%;
  height:200%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 6px
  );
  animation:storm 4s linear infinite;
}

@keyframes storm{
  0%{transform:translate(-10%,-10%)}
  100%{transform:translate(10%,10%)}
}

.pyramid{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  height:180px;
  background:linear-gradient(135deg,#c9a24a,#6b4b1a);
  clip-path:polygon(50% 0,0 100%,100% 100%);
}

/* ================= NEON ================= */
#neonCanvas{
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<!-- TOP TITLE -->
<div id="titleBar">SELECT ARCHIVE BIOME</div>

<!-- THUMBNAILS -->
<div id="top">
  <div class="navBtn" onclick="go(0)"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
  <div class="navBtn" onclick="go(1)"><img src="https://images.unsplash.com/photo-1608889175123-1c6f9f6c9b6c"></div>
  <div class="navBtn" onclick="go(2)"><img src="https://images.unsplash.com/photo-1547887537-6158d64c35b3"></div>
  <div class="navBtn" onclick="go(3)"><img src="https://images.unsplash.com/photo-1520975928316-56b5b6a2b4f5"></div>
</div>

<!-- CENTER LABEL -->
<div id="centerLabel"></div>

<div id="world">

  <div class="panel">
    <div class="roma"></div>
  </div>

  <div class="panel">
    <div class="cold"><div class="ice"></div></div>
  </div>

  <div class="panel">
    <div class="hot">
      <div class="sand"></div>
      <div class="pyramid"></div>
    </div>
  </div>

  <div class="panel">
    <canvas id="neonCanvas"></canvas>
  </div>

</div>

<script src="archive.js"></script>

</body>
</html>
