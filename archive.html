<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background:#000;
  color:white;
}

/* TOP BAR */
#top {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  gap:20px;
}

/* ARROWS */
.arrow {
  font-size:24px;
  cursor:pointer;
  user-select:none;
  color:silver;
  transition:0.2s;
}
.arrow:hover {
  transform:scale(1.2);
}

/* CATEGORY */
#category {
  font-size:14px;
  letter-spacing:3px;
}

/* SCENE */
#scene {
  width:100vw;
  height:100vh;
  transition:opacity 0.6s ease;
}

/* FADE LAYER */
#fade {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.6s ease;
}
</style>
</head>

<body>

<div id="top">
  <div class="arrow" onclick="prev()">‹</div>
  <div id="category">ALL / VIBES</div>
  <div class="arrow" onclick="next()">›</div>
</div>

<div id="scene"></div>
<div id="fade"></div>

<script src="archive.js"></script>

</body>
</html>
