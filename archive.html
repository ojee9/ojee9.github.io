<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE v7</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

/* TOP NAV (minimal, sadece kontrol) */
#top {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  z-index:10;
}

.arrow {
  color:rgba(255,255,255,0.6);
  font-size:28px;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}
.arrow:hover { transform:scale(1.2); }

/* WORLD */
#world {
  display:flex;
  width:400vw;
  height:100vh;
  transition:transform 1s cubic-bezier(.77,0,.18,1);
}

.panel {
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* ================= ROMA ================= */
.roma {
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, #3a3a3a, #000);
}

/* columns illusion */
.roma::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 30px,
    transparent 30px,
    transparent 100px
  );
  opacity:0.5;
  animation:move 10s linear infinite;
}

@keyframes move {
  from { transform:translateX(0); }
  to { transform:translateX(-100px); }
}

/* ================= COLD ================= */
.cold {
  width:100%;
  height:100%;
  background:linear-gradient(#0b1b2b,#050a12);
}

.cold::after {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,0.08), transparent);
  animation:fog 8s infinite linear;
}

@keyframes fog {
  0% { transform:translate(-10%, -10%); }
  50% { transform:translate(10%, 10%); }
  100% { transform:translate(-10%, -10%); }
}

/* ================= HOT ================= */
.hot {
  width:100%;
  height:100%;
  background:linear-gradient(#c49a3c,#7a5a1a);
  position:relative;
  overflow:hidden;
}

/* sand noise */
.hot::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.05) 2px,
    transparent 2px,
    transparent 5px
  );
  opacity:0.3;
}

/* ================= NEON ================= */
#neonCanvas {
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div id="top">
  <div class="arrow" onclick="prev()">‹</div>
  <div class="arrow" onclick="next()">›</div>
</div>

<div id="world">

  <!-- ROMA -->
  <div class="panel">
    <div class="roma"></div>
  </div>

  <!-- COLD -->
  <div class="panel">
    <div class="cold"></div>
  </div>

  <!-- HOT -->
  <div class="panel">
    <div class="hot"></div>
  </div>

  <!-- NEON -->
  <div class="panel">
    <canvas id="neonCanvas"></canvas>
  </div>

</div>

<script src="archive.js"></script>

</body>
</html>
