<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background:#000;
  color:white;
}

/* TOP UI */
#top {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:20px;
  z-index:10;
}

.arrow {
  font-size:26px;
  color:silver;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}
.arrow:hover {
  transform:scale(1.2);
}

#label {
  letter-spacing:3px;
  font-size:13px;
}

/* WORLD WRAPPER */
#world {
  display:flex;
  width:400vw; /* 4 kategori */
  height:100vh;
  transition:transform 0.8s ease;
}

/* PANEL */
.panel {
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
}

/* BIOME STYLES */
#all { background:linear-gradient(#1a1a1a,#000); }
#cold { background:#0b1b2b; }
#hot { background:#c49a3c; color:black; }
#neon { background:#050014; color:#00ffcc; }

</style>
</head>

<body>

<div id="top">
  <div class="arrow" onclick="prev()">‹</div>
  <div id="label">ALL / VIBES</div>
  <div class="arrow" onclick="next()">›</div>
</div>

<div id="world">

  <div class="panel" id="all">
    🏛 ROMA GARDEN / ALL VIBES
  </div>

  <div class="panel" id="cold">
    ❄ ICE WALL / COLD TAKE
  </div>

  <div class="panel" id="hot">
    🏺 ANCIENT EGYPT / HOT TAKE
  </div>

  <div class="panel" id="neon">
    🌃 NEON CITY / GRAVITY NIGHT
  </div>

</div>

<script src="archive.js"></script>

</body>
</html>
