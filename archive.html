<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ARCHIVE</title>

  <style>
    body { margin:0; overflow:hidden; }

    #archive-bg{
      position:fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
      z-index:0;
    }

    #archive-title{
      position:absolute;
      top:20px;
      width:100%;
      text-align:center;
      font-size:28px;
      color:white;
      z-index:2;
      font-family:Arial;
    }

    button{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:2;
      font-size:30px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    }

    #archive-left{ left:20px; }
    #archive-right{ right:20px; }
    #archive-home{
      top:20px;
      left:20px;
      transform:none;
    }

  </style>
</head>

<body>

<div id="archive-bg"></div>
<div id="archive-title"></div>

<button id="archive-left">◀</button>
<button id="archive-right">▶</button>
<button id="archive-home">⌂</button>

<script src="archive.js"></script>

</body>
</html>
