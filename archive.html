<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE v8.3</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  transform:scale(1.3); /* 🔥 3x feel boost */
}

/* HEADER */
#header{
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:14px;
  letter-spacing:5px;
  opacity:0.8;
  z-index:50;
}

/* ARROWS */
#nav{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:30px;
  z-index:50;
}

.arrow{
  font-size:34px;
  color:white;
  opacity:0.6;
  cursor:pointer;
  transition:0.2s;
}
.arrow:hover{opacity:1; transform:scale(1.2);}

/* CENTER LABEL */
#centerLabel{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  letter-spacing:6px;
  font-size:16px;
  z-index:50;
}

/* ================= THUMB CAROUSEL ================= */
#thumbs{
  position:fixed;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:20px;
  z-index:50;
}

.thumb{
  width:110px;
  height:70px;
  border-radius:8px;
  overflow:hidden;
  transition:0.5s;
  filter:blur(2px) brightness(0.5);
  transform:scale(0.9);
  opacity:0.5;
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* active center */
.thumb.active{
  filter:none;
  transform:scale(1.3);
  opacity:1;
  box-shadow:0 0 30px rgba(255,255,255,0.3);
}

/* ================= WORLD ================= */
#world{
  display:flex;
  width:400vw;
  height:100vh;
  transition:transform 1s cubic-bezier(.77,0,.18,1);
}

.panel{
  width:100vw;
  height:100vh;
  position:relative;
}

/* ================= ROMA ================= */
.roma{
  width:100%;
  height:100%;
  background:radial-gradient(circle,#3a3a3a,#000);
  filter:contrast(1.1);
}

/* ================= COLD ================= */
.cold{
  width:100%;
  height:100%;
  background:linear-gradient(#061522,#000);
}

.ice{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent);
}

/* ================= HOT ================= */
.hot{
  width:100%;
  height:100%;
  background:linear-gradient(#e0b85c,#6b4b1a);
  position:relative;
}

.sand{
  position:absolute;
  width:200%;
  height:200%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.04),
    rgba(255,255,255,0.04) 2px,
    transparent 2px,
    transparent 6px
  );
  animation:storm 4s linear infinite;
}

@keyframes storm{
  0%{transform:translate(-10%,-10%)}
  100%{transform:translate(10%,10%)}
}

.pyramid{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  width:220px;
  height:220px;
  background:linear-gradient(135deg,#d4b15a,#5a3f10);
  clip-path:polygon(50% 0,0 100%,100% 100%);
}

/* ================= NEON ================= */
#neonCanvas{
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div id="header">ARCHIVE SELECT SYSTEM</div>

<div id="nav">
  <div class="arrow" onclick="go(index-1)">‹</div>
  <div class="arrow" onclick="go(index+1)">›</div>
</div>

<div id="thumbs">

  <div class="thumb" onclick="go(0)">
    <img src="https://images.unsplash.com/photo-1548013146-72479768bada">
  </div>

  <div class="thumb" onclick="go(1)">
    <img src="https://images.unsplash.com/photo-1608889175123-1c6f9f6c9b6c">
  </div>

  <div class="thumb" onclick="go(2)">
    <img src="https://images.unsplash.com/photo-1547887537-6158d64c35b3">
  </div>

  <div class="thumb" onclick="go(3)">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  </div>

</div>

<div id="centerLabel"></div>

<div id="world">

  <div class="panel"><div class="roma"></div></div>

  <div class="panel"><div class="cold"><div class="ice"></div></div></div>

  <div class="panel"><div class="hot"><div class="sand"></div><div class="pyramid"></div></div></div>

  <div class="panel"><canvas id="neonCanvas"></canvas></div>

</div>

<script src="archive.js"></script>

</body>
</html>
