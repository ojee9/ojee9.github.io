<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: Arial;
  background:#000;
  color:white;
}

/* TOP NAV */
#top {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:20px;
  z-index:10;
}

.arrow {
  font-size:26px;
  color:silver;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}

.arrow:hover {
  transform:scale(1.2);
}

#label {
  letter-spacing:3px;
  font-size:13px;
}

/* WORLD */
#world {
  display:flex;
  width:400vw;
  height:100vh;
  transition:transform 0.8s ease;
}

.panel {
  width:100vw;
  height:100vh;
  position:relative;
}

/* ROMA */
.roma {
  width:100%;
  height:100%;
  background:linear-gradient(#2a2a2a,#000);
  position:relative;
  overflow:hidden;
}

.roma::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 40px,
    transparent 40px,
    transparent 120px
  );
  opacity:0.4;
}

.centerText {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  letter-spacing:4px;
}

/* COLD */
.cold {
  width:100%;
  height:100%;
  background:#0b1b2b;
  position:relative;
  overflow:hidden;
}

.cold-wall {
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg,#1b3a4b,#0b1b2b,#1b3a4b);
  transform:skewX(-10deg);
  opacity:0.6;
}

.fog {
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent);
  animation:fog 6s infinite linear;
}

@keyframes fog {
  0% { transform:translateX(-10%); }
  50% { transform:translateX(10%); }
  100% { transform:translateX(-10%); }
}

/* HOT */
.hot {
  width:100%;
  height:100%;
  background:#c49a3c;
  color:black;
  position:relative;
  overflow:hidden;
}

.papyrus {
  position:absolute;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.05) 2px,
    transparent 2px,
    transparent 6px
  );
  opacity:0.3;
}

/* NEON */
#neonCanvas {
  width:100%;
  height:100%;
  display:block;
}
</style>
</head>

<body>

<div id="top">
  <div class="arrow" onclick="prev()">‹</div>
  <div id="label">ALL / VIBES</div>
  <div class="arrow" onclick="next()">›</div>
</div>

<div id="world">

  <div class="panel">
    <div class="roma">
      <div class="centerText">🏛 ROMA GARDEN</div>
    </div>
  </div>

  <div class="panel">
    <div class="cold">
      <div class="cold-wall"></div>
      <div class="fog"></div>
      <div class="centerText">❄ ICE WALL</div>
    </div>
  </div>

  <div class="panel">
    <div class="hot">
      <div class="papyrus"></div>
      <div class="centerText">🏺 ANCIENT EGYPT</div>
    </div>
  </div>

  <div class="panel">
    <canvas id="neonCanvas"></canvas>
  </div>

</div>

<script src="archive.js"></script>

</body>
</html>
