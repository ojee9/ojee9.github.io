<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#05060a;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

.back{
  position:fixed;
  top:12px;
  left:12px;
  z-index:10;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
}

#map{
  width:100vw;
  height:100vh;
  position:relative;
}

/* NODE */

.node{
  position:absolute;
  width:100px;
  height:100px;
  transform:translate(-50%,-50%);
  cursor:pointer;
}

.star{
  width:100%;
  height:100%;
  background:white;
  clip-path:polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
  );
  background:radial-gradient(circle, #fff8d6 0%, #ffe27a 40%, #ffc93a 70%);
  filter:drop-shadow(0 0 14px rgba(255,220,120,0.7));
  transition:0.3s;
}

.node:hover .star{
  transform:scale(1.15);
  filter:drop-shadow(0 0 22px rgba(255,220,120,1));
}

.label{
  position:absolute;
  top:110%;
  left:50%;
  transform:translateX(-50%);
  white-space:nowrap;
  color:white;
  font-size:14px;
  opacity:0;
  transition:0.3s;
  pointer-events:none;
}

.node:hover .label{
  opacity:1;
}

/* mobile tap reveal */
.node.active .label{
  opacity:1;
}
</style>
</head>

<body>

<button class="back" onclick="window.location.href='index.html'">← HOME</button>

<div id="map"></div>

<script src="space.js"></script>

</body>
</html>
