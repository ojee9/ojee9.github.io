<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#05060a;
  font-family:Arial;
  overflow:hidden;
}

#map{
  position:relative;
  width:100vw;
  height:100vh;
}

/* BACK BUTTON */
.back{
  position:fixed;
  top:12px;
  left:12px;
  z-index:10;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
}

/* NODE */
.node{
  position:absolute;
  width:200px;
  text-align:center;
  transform:translate(-50%,-50%);
}

.node img{
  width:80px;
  height:80px;
}

.node span{
  display:block;
  color:white;
  font-size:14px;
  margin-top:6px;
}
</style>
</head>

<body>

<button class="back" onclick="goHome()">← HOME</button>

<div id="map"></div>

<script src="space.js"></script>

<script>
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
