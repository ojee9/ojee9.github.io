<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#07080d;
  font-family:Arial;
  color:white;
}

/* STARFIELD BACKGROUND */

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* MAIN MENU BUTTON */

.back{
  position:fixed;
  top:20px;
  left:20px;
  font-size:18px;
  padding:10px 18px;
  background:#fff4c2;
  color:black;
  text-decoration:none;
  font-weight:bold;
  border-radius:6px;
  z-index:2;
}

/* CENTER LINKS */

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:60px;
  flex-wrap:wrap;
  justify-content:center;
  z-index:2;
}

.node{
  width:110px;
  height:110px;
  position:relative;
  cursor:pointer;
}

.star{
  width:100%;
  height:100%;
  clip-path:polygon(
    50% 0%, 61% 35%, 98% 35%,
    68% 57%, 79% 91%, 50% 70%,
    21% 91%, 32% 57%, 2% 35%, 39% 35%
  );
  background:radial-gradient(circle,#fffbe6,#ffd54f);
  filter:drop-shadow(0 0 20px rgba(255,215,100,0.7));
  transition:0.3s;
}

.node:hover .star{
  transform:scale(1.15);
}

.label{
  position:absolute;
  top:120%;
  left:50%;
  transform:translateX(-50%);
  opacity:0;
  font-size:14px;
  white-space:nowrap;
  transition:0.3s;
}

.node:hover .label{
  opacity:1;
}

@media(max-width:768px){
  .node{
    width:80px;
    height:80px;
  }
  .center{
    gap:30px;
  }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<a class="back" href="index.html">← MAIN MENU</a>

<div class="center" id="links"></div>

<script src="space.js"></script>

</body>
</html>
