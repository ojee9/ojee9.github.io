<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE V10.3</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  transition:background 1s ease;
}

/* TOP BAR */
#nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:20px;
  z-index:50;
}

.arrow{
  color:white;
  font-size:34px;
  cursor:pointer;
  opacity:0.7;
}

#label{
  color:white;
  font-size:14px;
  letter-spacing:5px;
}

/* STAGE WRAPPER */
#stage{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* MAIN BACKGROUND */
#bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:1s ease;
  transform:scale(1.05);
}

/* DARK MOOD LAYER */
#overlay{
  position:absolute;
  width:100%;
  height:100%;
  transition:1s ease;
  background:rgba(0,0,0,0.35);
}

/* CENTER GLOW */
#glow{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.4));
}

/* SIDE PREVIEWS */
.side{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:180px;
  height:110px;
  background-size:cover;
  background-position:center;
  filter:blur(2px) brightness(0.4);
  opacity:0.5;
  transition:0.6s;
}

#left{left:30px;}
#right{right:30px;}

/* ACTIVE POP FEEL */
.activePop{
  transform:scale(1.08);
  filter:none;
  opacity:1;
}

/* LOCK INDICATOR */
#lock{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:12px;
  letter-spacing:4px;
  opacity:0.6;
}
</style>
</head>

<body>

<div id="nav">
  <div class="arrow" onclick="go(index-1)">‹</div>
  <div id="label"></div>
  <div class="arrow" onclick="go(index+1)">›</div>
</div>

<div id="stage">

  <div id="bg"></div>
  <div id="overlay"></div>
  <div id="glow"></div>

  <div id="left" class="side"></div>
  <div id="right" class="side"></div>

  <div id="lock">LOCKED STAGE SELECT</div>

</div>

<script src="archive.js"></script>

</body>
</html>
