<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE STAGE SELECT</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  transition:background 1s ease;
}

/* TOP NAV */
#nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  align-items:center;
  gap:25px;
  z-index:50;
}

.arrow{
  color:white;
  font-size:32px;
  cursor:pointer;
  opacity:0.7;
}

/* LABEL */
#label{
  color:white;
  font-size:14px;
  letter-spacing:5px;
}

/* STAGE */
#stage{
  position:relative;
  width:100vw;
  height:100vh;
}

/* BACKGROUND */
#bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:1s ease;
  filter:brightness(0.8);
}

/* OVERLAY */
#overlay{
  position:absolute;
  width:100%;
  height:100%;
  transition:1s ease;
  background:rgba(0,0,0,0.3);
}

/* THUMBS */
#thumbs{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:20;
}

.thumb{
  width:60px;
  height:40px;
  opacity:0.4;
  filter:blur(1px);
  transition:0.4s;
}

.thumb.active{
  opacity:1;
  filter:none;
  transform:scale(1.2);
}

.thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div id="nav">
  <div class="arrow" onclick="go(index-1)">‹</div>
  <div id="label"></div>
  <div class="arrow" onclick="go(index+1)">›</div>
</div>

<div id="stage">
  <div id="bg"></div>
  <div id="overlay"></div>

  <div id="thumbs"></div>
</div>

<script src="archive.js"></script>

</body>
</html>
