<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE NETWORK</title>

<style>
body{
  margin:0;
  background:#05060a;
  font-family:Arial;
  overflow:hidden;
}

/* GRID MAP */
#map{
  position:relative;
  width:100vw;
  height:100vh;
}

/* NODE */
.node{
  position:absolute;
  width:140px;
  text-align:center;
  cursor:pointer;
  transform:translate(-50%,-50%);
  transition:transform 0.2s ease;
}

.node:hover{
  transform:translate(-50%,-50%) scale(1.08);
}

/* ICON */
.node img{
  width:44px;
  height:44px;
  filter:drop-shadow(0 0 10px rgba(255,255,255,0.25));
}

/* LABEL */
.node span{
  display:block;
  margin-top:6px;
  color:white;
  font-size:13px;
  opacity:0.9;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="space.js"></script>

</body>
</html>
