<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>9o9</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background: #f3e9dc;
  color: #1a1a1a;

  font-family: 'Inter', sans-serif;
}

.container {
  text-align: center;
}

h1 {
  font-weight: 300;
  letter-spacing: 10px;
  margin-bottom: 40px;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}

button {
  padding: 12px 26px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.3);
  background: transparent;
  color: #1a1a1a;
  font-size: 12px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s ease;
}

button:hover {
  background: #1a1a1a;
  color: #f3e9dc;
  transform: translateY(-2px);
}

/* FADE TRANSITION */
#fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.9s ease;
}
</style>
</head>

<body>

<div class="container">
  <h1>9o9</h1>

  <div class="buttons">
    <button onclick="enterSpace()">SPACE</button>
    <button onclick="alert('ARCHIVE coming soon')">ARCHIVE</button>
    <button onclick="alert('VISUAL coming soon')">VISUAL</button>
  </div>
</div>

<div id="fade"></div>

<script>
function enterSpace() {
  const fade = document.getElementById("fade");
  fade.style.opacity = 1;

  setTimeout(() => {
    window.location.href = "space.html";
  }, 900);
}
</script>

</body>
</html>
