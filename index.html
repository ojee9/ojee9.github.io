<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPACE MOBILE</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#05060a;
  font-family:Arial;
  overflow:hidden;
}

#map{
  position:relative;
  width:100vw;
  height:100vh;
}

/* NODE */
.node{
  position:absolute;
  width:180px;
  text-align:center;
  cursor:pointer;
  transform:translate(-50%,-50%);
  transition:transform 0.25s ease;
}

.node:hover{
  transform:translate(-50%,-50%) scale(1.1);
}

/* ICON BIGGER */
.node img{
  width:64px;
  height:64px;
  filter:drop-shadow(0 0 12px rgba(255,255,255,0.25));
}

/* TEXT */
.node span{
  display:block;
  margin-top:8px;
  color:white;
  font-size:15px;
  opacity:0.9;
}

/* MOBILE BOOST */
@media (max-width: 768px){

  .node{
    width:220px;
  }

  .node img{
    width:84px;
    height:84px;
  }

  .node span{
    font-size:16px;
  }
}
</style>
</head>

<body>

<div id="map"></div>

<script src="space.js"></script>

</body>
</html>
