<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARCHIVE V10</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* ================= TOP BAR ================= */
#topBar{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:25px;
  z-index:50;
}

.tab{
  color:white;
  font-size:12px;
  letter-spacing:4px;
  opacity:0.4;
  cursor:pointer;
  transition:0.3s;
}

.tab.active{
  opacity:1;
  transform:scale(1.2);
}

/* ================= STAGE ================= */
#stage{
  width:100vw;
  height:100vh;
  position:relative;
}

/* ACTIVE BIOME */
.biome{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:1s;
}

/* DARK OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
}

/* ================= SIDE PREVIEWS ================= */
.side{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:200px;
  height:120px;
  opacity:0.25;
  filter:blur(2px);
  transition:0.5s;
  background-size:cover;
  background-position:center;
}

.left{
  left:40px;
}

.right{
  right:40px;
}

/* ================= NEON LAYER ================= */
#neonCanvas{
  position:absolute;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="topBar">
  <div class="tab active" onclick="go(0)">ALL VIBES</div>
  <div class="tab" onclick="go(1)">COLD TAKE</div>
  <div class="tab" onclick="go(2)">HOT TAKE</div>
  <div class="tab" onclick="go(3)">NEW NEON</div>
</div>

<div id="stage">

  <div id="biome" class="biome"></div>
  <div class="overlay"></div>

  <div id="left" class="side left"></div>
  <div id="right" class="side right"></div>

  <canvas id="neonCanvas"></canvas>

</div>

<script src="archive.js"></script>

</body>
</html>
